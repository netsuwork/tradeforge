<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeForge Academy</title>

  <script src="config.js"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: #1e293b;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      text-align: center;
    }

    p {
      text-align: center;
      margin-bottom: 30px;
      color: #94a3b8;
    }

    .tabs {
      display: flex;
      margin-bottom: 30px;
    }

    .tab {
      flex: 1;
      padding: 14px;
      border: none;
      background: #334155;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .tab.active {
      background: #3b82f6;
    }

    .form {
      display: none;
    }

    .form.active {
      display: block;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 18px;
      border: none;
      border-radius: 10px;
      background: #334155;
      color: white;
      font-size: 15px;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button.submit-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button.submit-btn:hover {
      background: #2563eb;
    }

    .info {
      margin-top: 25px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>TradeForge</h1>

    <p>
      Academy · Professional Trading Education
      <br>
      From zero to funded trader
    </p>

    <div class="tabs">
      <button class="tab active" onclick="showForm('signup')">
        Sign Up
      </button>

      <button class="tab" onclick="showForm('login')">
        Login
      </button>
    </div>

    <!-- SIGNUP FORM -->

    <div id="signup-form" class="form active">

      <input
        type="text"
        id="signup-name"
        placeholder="Full Name"
      >

      <input
        type="email"
        id="signup-email"
        placeholder="Email"
      >

      <input
        type="password"
        id="signup-password"
        placeholder="Password (min 6 characters)"
      >

      <button
        class="submit-btn"
        onclick="signup()"
      >
        Create Free Account
      </button>

    </div>

    <!-- LOGIN FORM -->

    <div id="login-form" class="form">

      <input
        type="email"
        id="login-email"
        placeholder="Email"
      >

      <input
        type="password"
        id="login-password"
        placeholder="Password"
      >

      <button
        class="submit-btn"
        onclick="login()"
      >
        Login
      </button>

    </div>

    <div class="info">
      Learn Forex · Track Progress · Become Funded
    </div>

  </div>

  <script>

    const API = window.TRADEFORGE_API;

    // =========================
    // TAB SWITCHING
    // =========================

    function showForm(type) {

      document.getElementById('signup-form')
        .classList.remove('active');

      document.getElementById('login-form')
        .classList.remove('active');

      document.querySelectorAll('.tab')
        .forEach(tab => tab.classList.remove('active'));

      if (type === 'signup') {

        document.getElementById('signup-form')
          .classList.add('active');

        document.querySelectorAll('.tab')[0]
          .classList.add('active');

      } else {

        document.getElementById('login-form')
          .classList.add('active');

        document.querySelectorAll('.tab')[1]
          .classList.add('active');
      }
    }

    // =========================
    // SIGNUP
    // =========================

    async function signup() {

      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;

      if (!name || !email || !password) {
        alert('Please fill all fields');
        return;
      }

      try {

        const response = await fetch(`${API}/signup`, {

          method: 'POST',

          headers: {
            'Content-Type': 'application/json'
          },

          body: JSON.stringify({
            name,
            email,
            password
          })

        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.error || 'Signup failed');
          return;
        }

        localStorage.setItem('token', data.token);

        alert('Account created successfully');

        window.location.href = 'app.html';

      } catch (err) {

        console.error(err);

        alert('Cannot connect to server. Please try again.');
      }
    }

    // =========================
    // LOGIN
    // =========================

    async function login() {

      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        alert('Please fill all fields');
        return;
      }

      try {

        const response = await fetch(`${API}/login`, {

          method: 'POST',

          headers: {
            'Content-Type': 'application/json'
          },

          body: JSON.stringify({
            email,
            password
          })

        });

        const data = await response.json();

        if (!response.ok) {
          alert(data.error || 'Login failed');
          return;
        }

        localStorage.setItem('token', data.token);

        alert('Login successful');

        window.location.href = 'app.html';

      } catch (err) {

        console.error(err);

        alert('Cannot connect to server. Please try again.');
      }
    }

  </script>

</body>
</html>
