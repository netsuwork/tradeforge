<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>TradeForge Academy</title>

  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      display: flex;
      min-height: 100vh;
    }

    /* ======================
       SIDEBAR
    ====================== */

    .sidebar {
      width: 260px;
      background: #111827;
      padding: 20px;
      border-right: 1px solid #1e293b;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #38bdf8;
    }

    .nav-btn {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
      text-align: left;
      transition: 0.3s;
      font-size: 15px;
    }

    .nav-btn:hover {
      background: #334155;
    }

    .logout-btn {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: #ef4444;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    /* ======================
       MAIN
    ====================== */

    .main {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .user-box {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      min-width: 240px;
    }

    .lesson-title {
      font-size: 34px;
      margin-bottom: 20px;
      color: #38bdf8;
    }

    .lesson-card {
      background: #1e293b;
      padding: 25px;
      border-radius: 16px;
      margin-bottom: 20px;
    }

    .lesson-card h2 {
      margin-bottom: 12px;
      color: #38bdf8;
    }

    .lesson-card p,
    .lesson-card li {
      line-height: 1.7;
      color: #cbd5e1;
    }

    .lesson-card ul {
      padding-left: 20px;
    }

  </style>

</head>

<body>

  <!-- ======================
       SIDEBAR
  ====================== -->

  <div class="sidebar">

    <div class="logo">
      TradeForge
    </div>

    <button
      class="nav-btn"
      onclick="loadLesson('basics')"
    >
      📘 Forex Basics
    </button>

    <button
      class="nav-btn"
      onclick="loadLesson('pairs')"
    >
      💱 Currency Pairs
    </button>

    <button
      class="nav-btn"
      onclick="loadLesson('candles')"
    >
      🕯 Candlestick Patterns
    </button>

    <button
      class="nav-btn"
      onclick="loadLesson('risk')"
    >
      ⚠️ Risk Management
    </button>

    <button
      class="nav-btn"
      onclick="loadLesson('psychology')"
    >
      🧠 Trading Psychology
    </button>

    <button
      class="nav-btn"
      onclick="loadLesson('strategy')"
    >
      📈 Trading Strategies
    </button>

    <button
      class="nav-btn"
      onclick="loadLesson('calendar')"
    >
      📅 Economic Calendar
    </button>

    <button
      class="nav-btn"
      onclick="loadLesson('charts')"
    >
      📊 Live Charts
    </button>

    <button
      class="logout-btn"
      onclick="logout()"
    >
      Logout
    </button>

  </div>

  <!-- ======================
       MAIN
  ====================== -->

  <div class="main">

    <div class="topbar">

      <h1>
        TradeForge Academy
      </h1>

      <div
        class="user-box"
        id="user-info"
      >
        Loading...
      </div>

    </div>

    <div id="content-area">

      <div class="lesson-page">

        <h1 class="lesson-title">
          Welcome to TradeForge
        </h1>

        <div class="lesson-card">

          <h2>
            Learn Forex From Zero To Expert
          </h2>

          <p>
            Select a lesson from the sidebar to begin learning.
          </p>

        </div>

      </div>

    </div>

  </div>

  <!-- ======================
       CONFIG
  ====================== -->

  <script src="config.js"></script>

  <!-- ======================
       APP SCRIPT
  ====================== -->

  <script>

    const API = window.TRADEFORGE_API;

    // ======================
    // TOKEN
    // ======================

    const token = localStorage.getItem('token');

    if (!token) {

      window.location.href = 'index.html';
    }

    // ======================
    // LOAD PROFILE
    // ======================

    async function loadProfile() {

      try {

        const response = await fetch(`${API}/profile`, {

          method: 'GET',

          headers: {

            'Content-Type': 'application/json',

            'Authorization': `Bearer ${token}`

          }

        });

        if (response.status === 401) {

          localStorage.removeItem('token');

          window.location.href = 'index.html';

          return;
        }

        const user = await response.json();

        document.getElementById('user-info').innerHTML = `
          👤 <strong>${user.name}</strong><br>
          ${user.email}<br>
          ⭐ XP: ${user.xp || 0}
        `;

      } catch (err) {

        console.error(err);

        alert('Cannot connect to server');
      }
    }

    loadProfile();

    // ======================
    // LOGOUT
    // ======================

    function logout() {

      localStorage.removeItem('token');

      window.location.href = 'index.html';
    }

    // ======================
    // COMPLETE LESSON
    // ======================

    async function completeLesson(lessonName) {

      try {

        await fetch(`${API}/complete-lesson`, {

          method: 'POST',

          headers: {

            'Content-Type': 'application/json',

            'Authorization': `Bearer ${token}`

          },

          body: JSON.stringify({

            lesson: lessonName

          })

        });

        alert('Lesson completed! +10 XP');

        loadProfile();

      } catch (err) {

        console.error(err);

        alert('Failed to save progress');
      }
    }

    // ======================
    // LOAD LESSONS
    // ======================

    function loadLesson(type) {

      const content = document.getElementById('content-area');

      // ======================
      // BASICS
      // ======================

      if (type === 'basics') {

        content.innerHTML = `

          <h1 class="lesson-title">
            Forex Basics
          </h1>

          <div class="lesson-card">

            <h2>What Is Forex?</h2>

            <p>
              Forex is the global currency exchange market.
            </p>

            <p>
              Traders buy and sell currencies to profit from price movement.
            </p>

          </div>

          <button
            class="logout-btn"
            onclick="completeLesson('Forex Basics')"
          >
            Complete Lesson
          </button>
        `;
      }

      // ======================
      // PAIRS
      // ======================

      else if (type === 'pairs') {

        content.innerHTML = `

          <h1 class="lesson-title">
            Currency Pairs
          </h1>

          <div class="lesson-card">

            <h2>Major Pairs</h2>

            <ul>
              <li>EUR/USD</li>
              <li>GBP/USD</li>
              <li>USD/JPY</li>
              <li>USD/CHF</li>
            </ul>

          </div>

          <button
            class="logout-btn"
            onclick="completeLesson('Currency Pairs')"
          >
            Complete Lesson
          </button>
        `;
      }

      // ======================
      // CANDLES
      // ======================

      else if (type === 'candles') {

        content.innerHTML = `

          <h1 class="lesson-title">
            Candlestick Patterns
          </h1>

          <div class="lesson-card">

            <h2>Bullish Engulfing</h2>

            <p>
              Indicates bullish momentum.
            </p>

          </div>

          <div class="lesson-card">

            <h2>Bearish Engulfing</h2>

            <p>
              Indicates bearish momentum.
            </p>

          </div>

          <button
            class="logout-btn"
            onclick="completeLesson('Candlestick Patterns')"
          >
            Complete Lesson
          </button>
        `;
      }

      // ======================
      // RISK
      // ======================

      else if (type === 'risk') {

        content.innerHTML = `

          <h1 class="lesson-title">
            Risk Management
          </h1>

          <div class="lesson-card">

            <h2>The 1% Rule</h2>

            <p>
              Never risk more than 1% of your account on one trade.
            </p>

          </div>

          <button
            class="logout-btn"
            onclick="completeLesson('Risk Management')"
          >
            Complete Lesson
          </button>
        `;
      }

      // ======================
      // PSYCHOLOGY
      // ======================

      else if (type === 'psychology') {

        content.innerHTML = `

          <h1 class="lesson-title">
            Trading Psychology
          </h1>

          <div class="lesson-card">

            <h2>Control Emotions</h2>

            <p>
              Fear and greed destroy traders.
            </p>

          </div>

          <button
            class="logout-btn"
            onclick="completeLesson('Trading Psychology')"
          >
            Complete Lesson
          </button>
        `;
      }

      // ======================
      // STRATEGY
      // ======================

      else if (type === 'strategy') {

        content.innerHTML = `

          <h1 class="lesson-title">
            Trading Strategies
          </h1>

          <div class="lesson-card">

            <h2>Trend Following</h2>

            <p>
              Trade with the overall trend direction.
            </p>

          </div>

          <button
            class="logout-btn"
            onclick="completeLesson('Trading Strategies')"
          >
            Complete Lesson
          </button>
        `;
      }

      // ======================
      // CALENDAR
      // ======================

      else if (type === 'calendar') {

        content.innerHTML = `

          <h1 class="lesson-title">
            Economic Calendar
          </h1>

          <div class="lesson-card">

            <h2>High Impact News</h2>

            <ul>
              <li>NFP</li>
              <li>FOMC</li>
              <li>CPI</li>
              <li>Interest Rate Decisions</li>
            </ul>

          </div>

          <button
            class="logout-btn"
            onclick="completeLesson('Economic Calendar')"
          >
            Complete Lesson
          </button>
        `;
      }

      // ======================
      // CHARTS
      // ======================

      else if (type === 'charts') {

        content.innerHTML = `

          <h1 class="lesson-title">
            Live Forex Charts
          </h1>

          <div class="lesson-card">

            <div
              id="tradingview_chart"
              style="height:500px;"
            ></div>

          </div>
        `;

        setTimeout(() => {

          new TradingView.widget({

            "width": "100%",
            "height": 500,
            "symbol": "FX:EURUSD",
            "interval": "15",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#111827",
            "enable_publishing": false,
            "allow_symbol_change": true,
            "container_id": "tradingview_chart"

          });

        }, 100);
      }
    }

  </script>

</body>

</html>
